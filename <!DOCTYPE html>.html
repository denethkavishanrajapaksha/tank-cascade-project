        // 1. Parse the data
        const parsedData = {};
        const rows = rawData.trim().split('\n');

        rows.forEach(row => {
            const parts = row.split('\t');
            if (parts.length >= 5) {
                const week = parts[0];
                if (!parsedData[week]) parsedData[week] = [];
                parsedData[week].push({
                    tank: parts[1],
                    runoff: parts[2],
                    upstream: parts[3],
                    total: parts[4]
                });
            }
        });

        // 2. State management
        let currentWeek = '1';
        const weeksAvailable = Object.keys(parsedData);

        // DOM Elements
        const weekSelectorEl = document.getElementById('weekSelector');
        const tableBodyEl = document.getElementById('tableBody');
        const currentWeekTitleEl = document.getElementById('currentWeekTitle');

        // 3. Render functions
        function renderWeekButtons() {
            weekSelectorEl.innerHTML = '';
            weeksAvailable.forEach(week => {
                const isActive = week === currentWeek;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 text-sm font-medium transition-colors border-b border-gray-100 flex justify-between items-center ${isActive ? 'bg-blue-50 text-blue-700 border-l-4 border-l-blue-600' : 'text-gray-600 hover:bg-gray-50 border-l-4 border-l-transparent'}`;
                btn.innerHTML = `
                    <span>Week ${week}</span>
                    <svg class="w-4 h-4 ${isActive ? 'text-blue-600' : 'text-gray-300'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                `;
                btn.onclick = () => {
                    currentWeek = week;
                    renderWeekButtons(); // Re-render to update active state
                    renderTableData();
                };
                weekSelectorEl.appendChild(btn);
            });
        }

        function renderTableData() {
            currentWeekTitleEl.textContent = `Week ${currentWeek} Overview`;
            tableBodyEl.innerHTML = '';

            const dataForWeek = parsedData[currentWeek] || [];

            dataForWeek.forEach((row, idx) => {
                const isNachchaduwa = row.tank.toLowerCase() === 'nachchaduwa';

                const tr = document.createElement('tr');
                // Apply a distinct style for the final sink tank (Nachchaduwa)
                tr.className = isNachchaduwa
                    ? 'bg-blue-50/50 hover:bg-blue-100 transition-colors border-t-2 border-blue-200'
                    : 'hover:bg-slate-50 transition-colors border-b border-gray-50';

                tr.innerHTML = `
                    <td class="px-6 py-4 border-r border-gray-100">
                        <div class="flex items-center">
                            <div class="w-2 h-2 rounded-full mr-3 ${isNachchaduwa ? 'bg-blue-600' : 'bg-teal-400'}"></div>
                            <span class="${isNachchaduwa ? 'font-bold text-blue-800 text-base' : 'font-medium text-slate-700'}">${row.tank}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right border-r border-gray-100 ${isNachchaduwa ? 'font-semibold text-slate-800' : 'text-slate-600'}">
                        ${formatNumber(row.runoff)}
                    </td>
                    <td class="px-6 py-4 text-right border-r border-gray-100 ${isNachchaduwa ? 'font-semibold text-slate-800' : 'text-slate-600'}">
                        ${formatNumber(row.upstream)}
                    </td>
                    <td class="px-6 py-4 text-right ${isNachchaduwa ? 'font-bold text-blue-700 text-base' : 'font-semibold text-slate-800'}">
                        ${formatNumber(row.total)}
                    </td>
                `;
                tableBodyEl.appendChild(tr);
            });
        }

        // Initialize App
        renderWeekButtons();
        renderTableData();
    </script>
